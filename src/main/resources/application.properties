# ==============================
# CONFIGURACIÓN BASE DE DATOS
# ==============================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USER:root}
quarkus.datasource.password=${DB_PASSWORD:Karen12345!}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:mysql://localhost:3306/AquaVitaeDB}

# ==============================
# FIREBASE ADMIN SDK
# ==============================
firebase.credentials=${FIREBASE_CREDENTIALS:src/main/resources/aquavitae-76bfa-firebase-adminsdk-fbsvc-56778c9f37.json}

# ==============================
# CLIENTES REST
# ==============================
quarkus.rest-client."org.acme.infrastructure.client.OpenMeteoClient".url=https://api.open-meteo.com
quarkus.rest-client."org.acme.infrastructure.client.NasaPowerClient".url=https://power.larc.nasa.gov
quarkus.rest-client."org.acme.infrastructure.client.SmnClient".url=https://smn.conagua.gob.mx

open-meteo-api/mp-rest/url=https://api.open-meteo.com
open-meteo-api/mp-rest/scope=jakarta.inject.Singleton

nasa-power-api/mp-rest/url=https://power.larc.nasa.gov
nasa-power-api/mp-rest/scope=jakarta.inject.Singleton

smn-api/mp-rest/url=https://smn.conagua.gob.mx
smn-api/mp-rest/scope=jakarta.inject.Singleton

# Fuente climática activa
fuente.clima.activa=openMeteo

# ==============================
# HIBERNATE
# ==============================
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

# ==============================
# SCHEDULER
# ==============================
quarkus.scheduler.enabled=true

# ==============================
# JSONB
# ==============================
quarkus.jsonb.adapters=com.aquavitae.infrastructure.config.LocalDateTimeAdapter

# ==============================
# CORS
# ==============================
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://aquavitae-app.web.app,https://aquavitae-app.firebaseapp.com}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type,Authorization
quarkus.http.cors.access-control-max-age=24H

# ==============================
# KAFKA
# ==============================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Producer clima
mp.messaging.outgoing.clima-batch-out.connector=smallrye-kafka
mp.messaging.outgoing.clima-batch-out.topic=clima-fetch
mp.messaging.outgoing.clima-batch-out.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# Consumer clima
mp.messaging.incoming.clima-batch-in.connector=smallrye-kafka
mp.messaging.incoming.clima-batch-in.topic=clima-fetch
mp.messaging.incoming.clima-batch-in.value.deserializer=com.aquavitae.infrastructure.messaging.kafka.ClimaBatchMessageDeserializer
mp.messaging.incoming.clima-batch-in.group.id=aquavitae-clima-group

# Producer alertas
mp.messaging.outgoing.alertas-out.connector=smallrye-kafka
mp.messaging.outgoing.alertas-out.topic=alertas-generadas
mp.messaging.outgoing.alertas-out.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# Consumer alertas
mp.messaging.incoming.alertas-in.connector=smallrye-kafka
mp.messaging.incoming.alertas-in.topic=alertas-generadas
mp.messaging.incoming.alertas-in.value.deserializer=com.aquavitae.infrastructure.messaging.kafka.AlertaKafkaMessageDeserializer
mp.messaging.incoming.alertas-in.group.id=aquavitae-alertas-group