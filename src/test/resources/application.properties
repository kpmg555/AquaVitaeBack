quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.jdbc.driver=org.h2.Driver
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect

quarkus.kafka.devservices.enabled=true
quarkus.kafka.devservices.port=0

mp.messaging.outgoing.alertas-out.connector=smallrye-kafka
mp.messaging.outgoing.alertas-out.topic=alertas-topic
mp.messaging.outgoing.alertas-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.outgoing.clima-batch-out.connector=smallrye-kafka
mp.messaging.outgoing.clima-batch-out.topic=clima-topic
mp.messaging.outgoing.clima-batch-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.incoming.alertas-in.connector=smallrye-kafka
mp.messaging.incoming.alertas-in.topic=alertas-topic
mp.messaging.incoming.alertas-in.value.deserializer=com.aquavitae.infrastructure.messaging.kafka.AlertaKafkaMessageDeserializer
mp.messaging.incoming.alertas-in.auto.offset.reset=earliest

mp.messaging.incoming.clima-batch-in.connector=smallrye-kafka
mp.messaging.incoming.clima-batch-in.topic=clima-topic
mp.messaging.incoming.clima-batch-in.value.deserializer=com.aquavitae.infrastructure.messaging.kafka.ClimaBatchMessageDeserializer
mp.messaging.incoming.clima-batch-in.auto.offset.reset=earliest

open-meteo-api/mp-rest/url=https://api.open-meteo.com
open-meteo-api/mp-rest/scope=jakarta.enterprise.context.ApplicationScoped

quarkus.log.level=WARN
quarkus.log.category."org.hibernate".level=ERROR
quarkus.log.category."com.aquavitae".level=DEBUG
quarkus.log.category."org.apache.kafka".level=ERROR
quarkus.log.category."io.smallrye.reactive.messaging".level=ERROR